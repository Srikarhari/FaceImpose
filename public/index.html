<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FaceImpose</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>FaceImpose</h1>
    <p class="subtitle">Face similarity matching</p>
  </header>

  <main>
    <section class="comparison">
      <div class="panel">
        <div class="panel-label">You</div>
        <div class="image-container">
          <video id="webcam" autoplay muted playsinline></video>
          <canvas id="capture-canvas" style="display:none;"></canvas>
        </div>
      </div>

      <div id="match-panel" class="panel" style="visibility:hidden;">
        <div class="panel-label">Top Match</div>
        <div class="image-container">
          <img id="match-img" src="" alt="Top match">
        </div>
      </div>
    </section>

    <div id="similarity-section" class="similarity-section" style="display:none;">
      <div class="similarity-label">
        <span id="match-filename" class="match-filename"></span>
        <span id="similarity-pct" class="similarity-pct"></span>
      </div>
      <div class="similarity-bar">
        <div id="similarity-fill" class="fill"></div>
      </div>
    </div>

    <div class="actions">
      <button id="capture-btn" disabled>Capture &amp; Match</button>
    </div>

    <div id="status" class="status">Loading models...</div>
  </main>

  <script src="/face-api.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
